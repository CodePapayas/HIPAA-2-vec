version: 1
entries:
  # Third-party / vendor relationships
  - term: vendor
    maps_to: business associate
    relationship: synonym
    notes: Any vendor handling PHI on your behalf is a BA under HIPAA

  - term: subprocessor
    maps_to: business associate
    relationship: synonym

  - term: third party
    maps_to: business associate
    relationship: synonym

  - term: contractor
    maps_to: business associate
    relationship: synonym

  - term: service provider
    maps_to: business associate
    relationship: synonym

  - term: partner
    maps_to: business associate
    relationship: synonym
    notes: Only when the partner handles PHI

  - term: SaaS
    maps_to: business associate
    relationship: synonym
    notes: A SaaS tool processing PHI needs a BAA

  - term: BAA
    maps_to: business associate agreement
    relationship: synonym

  # Disclosure / transmission
  - term: share
    maps_to: disclosure
    relationship: synonym

  - term: send
    maps_to: disclosure
    relationship: synonym

  - term: transmit
    maps_to: disclosure
    relationship: synonym

  - term: transfer
    maps_to: disclosure
    relationship: synonym

  - term: expose
    maps_to: disclosure
    relationship: synonym

  - term: give access
    maps_to: disclosure
    relationship: synonym

  # Destruction / deletion
  - term: delete
    maps_to: destruction
    relationship: synonym
    notes: HIPAA uses "destruction" not "deletion"

  - term: remove
    maps_to: destruction
    relationship: synonym

  - term: purge
    maps_to: destruction
    relationship: synonym

  - term: wipe
    maps_to: destruction
    relationship: synonym

  - term: shred
    maps_to: destruction
    relationship: synonym

  # Consent / authorization
  - term: consent
    maps_to: authorization
    relationship: synonym
    notes: HIPAA uses "authorization"; under 42 CFR Part 2 "consent" is the operative term for disclosure of substance use disorder records — context determines which applies

  - term: permission
    maps_to: authorization
    relationship: synonym

  - term: opt-in
    maps_to: authorization
    relationship: synonym

  # PHI / patient data terms
  - term: patient data
    maps_to: protected health information
    relationship: synonym

  - term: health data
    maps_to: protected health information
    relationship: synonym

  - term: medical record
    maps_to: protected health information
    relationship: hyponym

  - term: EHR
    maps_to: protected health information
    relationship: hyponym

  - term: de-identified
    maps_to: protected health information
    relationship: anti
    notes: De-identified data is NOT PHI per § 164.514

  - term: anonymized
    maps_to: protected health information
    relationship: anti
    notes: If properly anonymized under Safe Harbor or Expert Determination, not PHI

  - term: aggregated
    maps_to: protected health information
    relationship: anti
    scope:
      - de-identified
      - aggregate
    notes: Aggregate stats without identifiers are not PHI

  # Logging / audit
  - term: logging
    maps_to: audit controls
    relationship: synonym
    notes: HIPAA § 164.312(b) requires audit controls / activity logs

  - term: audit log
    maps_to: audit controls
    relationship: synonym

  - term: access log
    maps_to: audit controls
    relationship: synonym

  - term: event log
    maps_to: audit controls
    relationship: synonym

  # Security / access control
  - term: password
    maps_to: authentication
    relationship: hyponym

  - term: MFA
    maps_to: authentication
    relationship: hyponym

  - term: SSO
    maps_to: authentication
    relationship: hyponym

  - term: encryption
    maps_to: encryption and decryption
    relationship: synonym

  - term: encrypt at rest
    maps_to: encryption and decryption
    relationship: synonym

  - term: encrypt in transit
    maps_to: transmission security
    relationship: synonym

  - term: TLS
    maps_to: transmission security
    relationship: hyponym

  - term: role-based access
    maps_to: access control
    relationship: hyponym

  - term: RBAC
    maps_to: access control
    relationship: hyponym

  - term: least privilege
    maps_to: minimum necessary
    relationship: synonym

  # Breach / incident
  - term: breach
    maps_to: breach notification
    relationship: hyponym
    notes: Breach is the event; breach notification is the resulting obligation under § 164.400

  - term: data leak
    maps_to: breach notification
    relationship: hyponym

  - term: incident
    maps_to: breach notification
    relationship: contextual
    scope:
      - data
      - PHI
      - security

  # Treatment / payment / operations
  - term: TPO
    maps_to: treatment payment operations
    relationship: synonym

  # Workforce
  - term: employee
    maps_to: workforce member
    relationship: synonym

  - term: staff
    maps_to: workforce member
    relationship: synonym

  - term: developer
    maps_to: workforce member
    relationship: hyponym
    notes: Developers with PHI access are workforce members requiring training

  # Software / app vocabulary — dev terms that map to regulatory concepts
  - term: app
    maps_to: electronic information system
    relationship: synonym
    notes: App in HIPAA context is an electronic information system under sec 164.304

  - term: application
    maps_to: electronic information system
    relationship: synonym

  - term: service
    maps_to: electronic information system
    relationship: contextual
    scope:
      - software
      - API
      - microservice
      - backend
      - cloud

  - term: site
    maps_to: electronic information system
    relationship: contextual
    scope:
      - web
      - portal
      - patient
      - provider

  - term: website
    maps_to: electronic information system
    relationship: synonym

  - term: platform
    maps_to: electronic information system
    relationship: synonym

  - term: microservice
    maps_to: business associate
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
    notes: A microservice that processes PHI on behalf of a CE is a business associate

  - term: API
    maps_to: business associate
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data
    notes: Exposing or consuming an API that passes PHI triggers BAA requirements

  - term: webhook
    maps_to: disclosure
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
    notes: Webhooks that push PHI to external endpoints are disclosures

  - term: connector
    maps_to: business associate
    relationship: contextual
    scope:
      - PHI
      - health
      - integration
      - data

  - term: integration
    maps_to: disclosure
    relationship: synonym
    notes: Integrating a third-party service that touches PHI = disclosure requiring BAA

  - term: integrate
    maps_to: disclosure
    relationship: synonym

  - term: pipeline
    maps_to: electronic information system
    relationship: contextual
    scope:
      - data
      - PHI
      - health

  # Inter-service communication — devs say "speak to", "talk to", "call"
  - term: speak to
    maps_to: transmission
    relationship: synonym
    notes: '"App speaks to service" = electronic transmission of data; if PHI, triggers § 164.312(e)'

  - term: speak with
    maps_to: transmission
    relationship: synonym

  - term: talk to
    maps_to: transmission
    relationship: synonym

  - term: talk with
    maps_to: transmission
    relationship: synonym

  - term: calls
    maps_to: transmission
    relationship: contextual
    scope:
      - API
      - service
      - endpoint
      - HTTP
      - request
    notes: Service-to-service calls carrying PHI = transmission requiring encryption

  - term: call
    maps_to: transmission
    relationship: contextual
    scope:
      - API
      - service
      - endpoint

  - term: communicate
    maps_to: transmission
    relationship: contextual
    scope:
      - service
      - API
      - system
      - app
      - software

  - term: connect
    maps_to: transmission
    relationship: contextual
    scope:
      - service
      - API
      - database
      - system

  - term: fetch
    maps_to: transmission
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data

  - term: push
    maps_to: disclosure
    relationship: contextual
    scope:
      - data
      - PHI
      - health
      - notification

  - term: pull
    maps_to: transmission
    relationship: contextual
    scope:
      - data
      - PHI
      - health

  - term: sync
    maps_to: transmission
    relationship: contextual
    scope:
      - data
      - PHI
      - health
      - records
    notes: Syncing PHI between systems = transmission; each endpoint needs safeguards

  - term: endpoint
    maps_to: electronic information system
    relationship: contextual
    scope:
      - API
      - service
      - HTTP

  - term: third-party service
    maps_to: business associate
    relationship: synonym

  - term: external service
    maps_to: business associate
    relationship: synonym

  # Storage / persistence
  - term: store
    maps_to: electronic protected health information
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data
    notes: Storing PHI = ePHI at rest; triggers § 164.312(a) access control and § 164.312(d) encryption addressable spec

  - term: persist
    maps_to: electronic protected health information
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data

  - term: cache
    maps_to: electronic protected health information
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data
    notes: Cached PHI is still ePHI; in-memory or Redis caches containing PHI require same safeguards as persistent storage

  - term: backup
    maps_to: data backup plan
    relationship: synonym
    notes: § 164.308(a)(7)(ii)(A) requires retrievable exact copies of ePHI; backup systems are covered

  - term: database
    maps_to: electronic information system
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data

  - term: DB
    maps_to: electronic information system
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data

  # Cloud / object storage
  - term: cloud
    maps_to: business associate
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data
      - storage
    notes: Cloud providers storing or processing PHI are business associates requiring a BAA

  - term: S3
    maps_to: business associate
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data
    notes: S3 buckets containing PHI make AWS a business associate; BAA required

  - term: object storage
    maps_to: business associate
    relationship: contextual
    scope:
      - PHI
      - health
      - data

  # Export / download / report
  - term: export
    maps_to: disclosure
    relationship: synonym
    notes: Exporting PHI to a file or external system = disclosure

  - term: download
    maps_to: disclosure
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data

  - term: report
    maps_to: disclosure
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data

  # Messaging / queues
  - term: notification
    maps_to: disclosure
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
    notes: Push notifications carrying PHI (e.g. appointment reminders with identifiers) are disclosures

  - term: queue
    maps_to: electronic information system
    relationship: contextual
    scope:
      - PHI
      - health
      - patient
      - data

  - term: message queue
    maps_to: electronic information system
    relationship: contextual
    scope:
      - PHI
      - health
      - data
    notes: Message queues (Kafka, SQS, RabbitMQ) carrying PHI are electronic information systems requiring safeguards

  - term: Kafka
    maps_to: electronic information system
    relationship: contextual
    scope:
      - PHI
      - health
      - data
    notes: Kafka topics carrying PHI require encryption in transit and access controls per § 164.312
